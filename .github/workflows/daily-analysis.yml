name: Daily Subscription Analysis

on:
  schedule:
    # 월~금 한국 시간 오전 8시 (UTC 일~목 23:00)
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write # 결과 저장을 위한 쓰기 권한 필수

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Restore Gemini CLI Auth
        run: |
          mkdir -p ~/.gemini
          echo '${{ secrets.GEMINI_OAUTH_CREDS }}' > ~/.gemini/oauth_creds.json
          echo '{"security":{"auth":{"selectedType":"oauth-personal"}}}' > ~/.gemini/settings.json

      - name: Run Analysis
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # .env 파일 생성
          echo "SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL" > .env
          chmod +x auto-run.sh
          ./auto-run.sh

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/results/
          # 변경사항이 있을 때만 커밋 및 푸시 (develop 브랜치 자동 감지)
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update analysis results [skip ci]"
            git push
          else
            echo "No new results to commit."
          fi
