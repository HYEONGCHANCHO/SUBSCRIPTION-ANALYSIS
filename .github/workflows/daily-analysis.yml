name: Daily Subscription Analysis

on:
  schedule:
    # 월~금 한국 시간 오전 8시 (UTC 일~목 23:00)
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Restore Gemini CLI Auth
        run: |
          mkdir -p ~/.gemini
          echo '${{ secrets.GEMINI_OAUTH_CREDS }}' > ~/.gemini/oauth_creds.json
          echo '{"security":{"auth":{"selectedType":"oauth-personal"}}}' > ~/.gemini/settings.json

      - name: Run Analysis
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL" > .env
          chmod +x auto-run.sh
          ./auto-run.sh

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/results/
          git commit -m "chore: update analysis results [skip ci]" || echo "No changes to commit"
          git push origin develop # 현재 브랜치명 확인 필요 (develop로 가정)
