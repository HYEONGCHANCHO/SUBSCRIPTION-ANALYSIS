name: Daily Subscription Analysis

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          echo "SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL" >> .env
          chmod +x auto-run.sh
          ./auto-run.sh

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/results/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update analysis results [skip ci]" && git push)
