name: Daily Subscription Analysis

on:
  schedule:
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

env:
  # 구형 Node.js 액션 실행을 허용하고 24 버전으로의 전환을 승인함
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v4는 내부적으로 최신 노드를 지원하도록 업데이트됨

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Restore Gemini CLI Auth
        run: |
          mkdir -p ~/.gemini
          echo '${{ secrets.GEMINI_OAUTH_CREDS }}' > ~/.gemini/oauth_creds.json
          echo '{"security":{"auth":{"selectedType":"oauth-personal"}}}' > ~/.gemini/settings.json

      - name: Run Analysis
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL" > .env
          chmod +x auto-run.sh
          ./auto-run.sh

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/results/
          git commit -m "chore: update analysis results [skip ci]" || echo "No changes to commit"
          git push origin develop
